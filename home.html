<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Health Predictor</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    background: #0f172a;
    color: white;
}

/* NAVBAR */
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 15px 50px;
    background: #020617;
}

header h1 {
    color: #38bdf8;
}

nav a {
    margin-left: 25px;
    text-decoration: none;
    color: white;
    transition: 0.3s;
}

nav a:hover {
    color: #38bdf8;
}

/* HERO */
.hero {
    height: 80vh;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    text-align: center;
}

.hero h2 {
    font-size: 45px;
    margin-bottom: 15px;
}

.hero span {
    color: #38bdf8;
}

.hero p {
    font-size: 18px;
    margin-bottom: 25px;
}

/* BUTTON */
.btn-custom {
    background: #38bdf8;
    color: black;
    padding: 12px 30px;
    border-radius: 30px;
    font-weight: bold;
    text-decoration: none;
    transition: 0.3s;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}

.btn-custom:hover {
    background: #0ea5e9;
    transform: scale(1.05);
    color: black;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 20px;
    background: #020617;
}

footer i {
    margin: 10px;
    font-size: 22px;
    cursor: pointer;
    color: white;
}

footer i:hover {
    color: #38bdf8;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<header>
    <h1>HealthAI</h1>
    <nav>
        <a href="{{url_for('home')}}">Home</a>
        <a href="{{ url_for('about') }}">About</a>
        <a href="{{url_for('login')}}">Login</a>
        <a href="{{url_for('register')}}">Register</a>
    </nav>
</header>

<!-- HERO -->
<section class="hero">
    <h2>Predict Diseases with <span>AI</span></h2>
    <p>Smart system for early detection of major diseases</p>

    <!-- ✅ Explore Button -->
    <a href="{{ url_for('explore') }}" class="btn-custom">
        🔍 Explore
    </a>
</section>

<!-- FOOTER -->
<footer>
    <p>Connect with us</p>

    <a href="https://instagram.com"><i class="fab fa-instagram"></i></a>
    <a href="https://facebook.com"><i class="fab fa-facebook"></i></a>
    <a href="https://wa.me/"><i class="fab fa-whatsapp"></i></a>

    <p>© 2026 HealthAI</p>
</footer>

</body>
</html>
