<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Liver Disease Prediction</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: linear-gradient(to right, #ff9966, #ff5e62);
    font-family: Arial, sans-serif;
}

.box {
    background: white;
    padding: 30px;
    margin-top: 60px;
    border-radius: 15px;
    box-shadow: 0px 5px 15px rgba(0,0,0,0.3);
}

h2 {
    text-align: center;
    margin-bottom: 20px;
    font-weight: bold;
}

.result {
    text-align: center;
    font-size: 18px;
    margin-bottom: 15px;
    color: green;
}

.btn-custom {
    width: 100%;
    border-radius: 20px;
}
</style>
</head>

<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">

            <div class="box">

                <h2>🍺 Liver Disease Prediction</h2>

                <!-- OUTPUT -->
                {% if output %}
                <div class="result">
                    {{ output }}
                </div>
                {% endif %}

                <!-- FORM -->
                <form method="POST" action="{{ url_for('liver') }}">

                    <div class="row">

                        <div class="col-md-6 mb-3">
                            <label>Age</label>
                            <input type="number" name="age" class="form-control" required>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label>Gender (0=Female, 1=Male)</label>
                            <input type="number" name="gender" class="form-control" required>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label>Total Bilirubin</label>
                            <input type="number" step="any" name="tb" class="form-control" required>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label>Direct Bilirubin</label>
                            <input type="number" step="any" name="db" class="form-control" required>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label>Alkaline Phosphotase</label>
                            <input type="number" name="ap" class="form-control" required>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label>Alamine Aminotransferase</label>
                            <input type="number" name="aa" class="form-control" required>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label>Aspartate Aminotransferase</label>
                            <input type="number" name="sa" class="form-control" required>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label>Total Proteins</label>
                            <input type="number" step="any" name="tp" class="form-control" required>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label>Albumin</label>
                            <input type="number" step="any" name="alb" class="form-control" required>
                        </div>

                        <div class="col-md-6 mb-3">
                            <label>A/G Ratio</label>
                            <input type="number" step="any" name="agr" class="form-control" required>
                        </div>

                    </div>

                    <button type="submit" class="btn btn-dark btn-custom mt-3">
                        Predict
                    </button>
                    <div class="text-center mt-4">
                        <a href="{{ url_for('explore') }}" class="btn btn-success">
                            EXIT
                        </a>
                    </div>

                </form>

            </div>

        </div>
    </div>
</div>

</body>
</html>
