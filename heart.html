<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Heart Health Analysis</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #f8f9fa, #e9ecef);
        }
        .card {
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        .card-header {
            background-color: #dc3545;
            color: white;
            font-weight: bold;
            font-size: 22px;
            text-align: center;
            border-top-left-radius: 15px;
            border-top-right-radius: 15px;
        }
        .btn-custom {
            background-color: #dc3545;
            color: white;
            padding: 10px 30px;
            border-radius: 25px;
            font-weight: 500;
        }
        .btn-custom:hover {
            background-color: #bb2d3b;
        }
        .output-box {
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-10">

            <div class="card">

                <div class="card-header">
                    ❤️ Heart Health Analysis System
                </div>

                <div class="card-body p-4">

                    <!-- OUTPUT -->
                    <div class="text-center mb-4 output-box">
                        Result: 
                        <span class="badge bg-danger fs-6">
                            {{output}}
                        </span>
                    </div>

                    <form action="/prediction" method="POST">

                        <div class="row mb-3">
                            <div class="col">
                                <label class="form-label">Age</label>
                                <input type="text" name="age" class="form-control" required>
                            </div>
                            <div class="col">
                                <label class="form-label">Sex</label>
                                <input type="text" name="sex" class="form-control" required>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col">
                                <label class="form-label">Chest Pain Type (CP)</label>
                                <input type="text" name="cp" class="form-control" required>
                            </div>
                            <div class="col">
                                <label class="form-label">Resting BP (TRESTBPS)</label>
                                <input type="text" name="trestbps" class="form-control" required>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col">
                                <label class="form-label">Cholesterol (CHOL)</label>
                                <input type="text" name="chol" class="form-control" required>
                            </div>
                            <div class="col">
                                <label class="form-label">Fasting Blood Sugar (FBS)</label>
                                <input type="text" name="fbs" class="form-control" required>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col">
                                <label class="form-label">Rest ECG</label>
                                <input type="text" name="restecg" class="form-control" required>
                            </div>
                            <div class="col">
                                <label class="form-label">Max Heart Rate (THALACH)</label>
                                <input type="text" name="thalach" class="form-control" required>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col">
                                <label class="form-label">Exercise Induced Angina (EXANG)</label>
                                <input type="text" name="exang" class="form-control" required>
                            </div>
                            <div class="col">
                                <label class="form-label">Oldpeak</label>
                                <input type="text" name="oldpeak" class="form-control" required>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col">
                                <label class="form-label">Slope</label>
                                <input type="text" name="slope" class="form-control" required>
                            </div>
                            <div class="col">
                                <label class="form-label">CA</label>
                                <input type="text" name="ca" class="form-control" required>
                            </div>
                        </div>

                        <div class="row mb-3">
                            <div class="col">
                                <label class="form-label">Thal</label>
                                <input type="text" name="thal" class="form-control" required>
                            </div>
                        </div>

                        <div class="text-center mt-4">
                            <button type="submit" class="btn btn-custom">
                                Analyze Heart Status
                            </button>
                        

                        <div class="text-left mt-4">
                            <a href="{{ url_for('explore') }}" class="btn btn-success">
                                EXIT
                            </a>
                        </div>

                    </form>

                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
